name: Update Scores Daily

on:
  schedule:
    # Runs at 06:00 UTC every day — Beijing time is UTC+8, so this is 14:00 local
    - cron: '0 6 * * *'
  # Also lets you trigger it manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: python scrape_scores.py

      - name: Commit scores.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scores.json
          # Only commit if scores.json actually changed
          git diff --staged --quiet || git commit -m "chore: update scores $(date -u +%Y-%m-%d)"
          git push
